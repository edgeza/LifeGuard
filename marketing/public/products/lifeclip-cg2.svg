<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-label="LifeClip CG2 — discreet clip for clip-on use, shares LTE from a paired phone.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#f4f6fb"/>
      <stop offset="100%" stop-color="#dde3ee"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4252"/>
      <stop offset="100%" stop-color="#14181f"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1620"/>
      <stop offset="100%" stop-color="#050a13"/>
    </radialGradient>
    <linearGradient id="clip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="480" fill="url(#bg)"/>
  <ellipse cx="240" cy="380" rx="120" ry="11" fill="#0b1320" fill-opacity="0.08"/>

  <!-- the clip body is oval/rounded-rectangle, slightly off vertical -->
  <g transform="translate(240,230) rotate(15)" filter="url(#drop)">
    <!-- back clip arm -->
    <rect x="-30" y="-90" width="6" height="84" rx="3" fill="url(#clip)" opacity="0.85"/>
    <!-- main body -->
    <rect x="-58" y="-44" width="116" height="118" rx="32" fill="url(#body)"/>
    <!-- bezel highlight -->
    <rect x="-56" y="-42" width="112" height="114" rx="30" fill="none" stroke="url(#bezel)" stroke-width="1.4"/>
    <!-- engraved face panel -->
    <rect x="-44" y="-30" width="88" height="86" rx="22" fill="url(#face)"/>
    <!-- small recessed button -->
    <circle cx="0" cy="14" r="20" fill="#06b6a4"/>
    <circle cx="0" cy="14" r="20" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="0.8"/>
    <circle cx="0" cy="14" r="16" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="0.6"/>
    <text x="0" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="2.2">SOS</text>
    <!-- LG logo etching above the button -->
    <text x="0" y="-12" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" letter-spacing="2.4" fill="#94a3b8">LIFEGUARD</text>
    <!-- an LED indicator pixel -->
    <circle cx="20" cy="-22" r="1.4" fill="#34d399"/>
    <!-- a second LED (BLE status) -->
    <circle cx="-20" cy="-22" r="1.4" fill="#06b6a4"/>

    <!-- the back spring clip visible behind the body -->
    <path d="M -8 78 L -8 110 a 8 8 0 0 0 16 0 L 8 78" fill="url(#clip)"/>
  </g>

  <text x="240" y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2.5" fill="#475569">LIFE CLIP · CG2</text>
  <text x="240" y="450" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">12 g · BT 5.3 · 3 d paired · Discreet, reversible</text>

  <g transform="translate(40,420)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#64748b" font-weight="500">
    <rect x="0" y="-9" width="64" height="14" rx="2" fill="#fff" stroke="#e5edf5"/>
    <text x="6" y="1">SKU LCG2</text>
  </g>
</svg>
