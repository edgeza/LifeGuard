<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-label="LifeBand G2 — wristband wearable with heart rate, SpO2, and fall detection.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#f4f6fb"/>
      <stop offset="100%" stop-color="#dde3ee"/>
    </radialGradient>
    <linearGradient id="strapA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="50%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="strapB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="50%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0b1320"/>
    </linearGradient>
    <linearGradient id="caseMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4252"/>
      <stop offset="40%" stop-color="#252b3a"/>
      <stop offset="100%" stop-color="#14181f"/>
    </linearGradient>
    <linearGradient id="caseEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5263" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2a313e" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="screen" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#0d1620"/>
      <stop offset="100%" stop-color="#050a13"/>
    </radialGradient>
    <linearGradient id="screenGlare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="lgLogo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="caseShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="480" height="480" fill="url(#bg)"/>

  <!-- subtle reflection on the mat -->
  <ellipse cx="240" cy="370" rx="160" ry="14" fill="#0b1320" fill-opacity="0.07"/>

  <!-- the band curves around the wrist, here we show it as a horizontal strap with both sides looping -->
  <g filter="url(#softShadow)">
    <!-- left strap (with buckle holes) -->
    <path d="M 35 240 Q 35 195 100 195 L 165 195 L 165 285 L 100 285 Q 35 285 35 240 Z" fill="url(#strapA)"/>
    <!-- left strap buckle holes -->
    <circle cx="125" cy="215" r="3.2" fill="#0b1320"/>
    <circle cx="125" cy="240" r="3.2" fill="#0b1320"/>
    <circle cx="125" cy="265" r="3.2" fill="#0b1320"/>
    <circle cx="105" cy="215" r="3.2" fill="#0b1320"/>
    <circle cx="105" cy="240" r="3.2" fill="#0b1320"/>
    <circle cx="105" cy="265" r="3.2" fill="#0b1320"/>
    <circle cx="85" cy="215" r="3.2" fill="#0b1320"/>
    <circle cx="85" cy="240" r="3.2" fill="#0b1320"/>
    <circle cx="85" cy="265" r="3.2" fill="#0b1320"/>

    <!-- right strap -->
    <path d="M 445 240 Q 445 195 380 195 L 315 195 L 315 285 L 380 285 Q 445 285 445 240 Z" fill="url(#strapB)"/>

    <!-- subtle ribbed texture on the right strap -->
    <g opacity="0.18">
      <line x1="320" y1="207" x2="430" y2="207" stroke="#fff" stroke-width="0.6"/>
      <line x1="320" y1="220" x2="430" y2="220" stroke="#fff" stroke-width="0.6"/>
      <line x1="320" y1="233" x2="430" y2="233" stroke="#fff" stroke-width="0.6"/>
      <line x1="320" y1="247" x2="430" y2="247" stroke="#fff" stroke-width="0.6"/>
      <line x1="320" y1="261" x2="430" y2="261" stroke="#fff" stroke-width="0.6"/>
      <line x1="320" y1="274" x2="430" y2="274" stroke="#fff" stroke-width="0.6"/>
    </g>
  </g>

  <!-- the metal case (rounded squircle) — the "watch face" body -->
  <g filter="url(#caseShadow)">
    <rect x="165" y="170" width="150" height="140" rx="42" ry="42" fill="url(#caseMetal)"/>
    <!-- chamfered edge highlight -->
    <rect x="167" y="172" width="146" height="136" rx="40" ry="40" fill="none" stroke="url(#caseEdge)" stroke-width="1.6"/>
    <!-- crown button on the right side -->
    <rect x="313" y="218" width="6" height="22" rx="2" fill="#3a4252"/>
    <rect x="313" y="246" width="6" height="14" rx="2" fill="#3a4252"/>
    <!-- speaker / mic grilles top + bottom -->
    <g fill="#0a0e16">
      <rect x="186" y="178" width="18" height="2.2" rx="1"/>
      <rect x="276" y="178" width="18" height="2.2" rx="1"/>
      <rect x="186" y="300" width="18" height="2.2" rx="1"/>
      <rect x="276" y="300" width="18" height="2.2" rx="1"/>
    </g>
  </g>

  <!-- the screen face -->
  <rect x="185" y="190" width="110" height="100" rx="22" ry="22" fill="url(#screen)"/>
  <!-- reflective sheen across the glass -->
  <rect x="185" y="190" width="110" height="100" rx="22" ry="22" fill="url(#screenGlare)" opacity="0.45"/>

  <!-- screen UI: time / HR / status -->
  <g font-family="Inter, -apple-system, system-ui, Segoe UI, Roboto, sans-serif" fill="#e6e9ef">
    <text x="200" y="210" font-size="9" font-weight="600" letter-spacing="2.4" fill="#94a3b8">LIFE BAND</text>
    <text x="280" y="210" font-size="9" font-weight="600" letter-spacing="2.4" fill="#06b6a4" text-anchor="end">● LINK</text>

    <text x="200" y="240" font-size="30" font-weight="300" font-feature-settings="'cv11','ss01'" letter-spacing="-0.6">13:47</text>

    <!-- big heart rate -->
    <text x="200" y="270" font-size="22" font-weight="300" letter-spacing="-0.4" fill="#94a3b8">HR</text>
    <text x="240" y="270" font-size="22" font-weight="600" letter-spacing="-0.4" fill="#34d399">72</text>
    <text x="278" y="270" font-size="11" font-weight="500" fill="#94a3b8">bpm</text>

    <!-- heart icon -->
    <g transform="translate(200,280)" fill="url(#heart)">
      <path d="M 8 8 c -2 -3 -7 -3 -7 1 c 0 4 7 9 7 9 s 7 -5 7 -9 c 0 -4 -5 -4 -7 -1 Z"/>
    </g>
    <text x="216" y="290" font-size="8" font-weight="500" fill="#94a3b8">RHythm stable</text>
  </g>

  <!-- subtle screen edge ring -->
  <circle cx="240" cy="240" r="36" fill="none" stroke="#06b6a4" stroke-opacity="0.15" stroke-width="0.6"/>

  <!-- bottom product label -->
  <text x="240" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2.5" fill="#475569">LIFE BAND · G2</text>
  <text x="240" y="440" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">38 g · IP67 · LTE-M / Wi-Fi / GPS · 7 d battery</text>

  <!-- the small spec chip bottom-left -->
  <g transform="translate(40,420)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#64748b" font-weight="500">
    <rect x="0" y="-9" width="64" height="14" rx="2" fill="#fff" stroke="#e5edf5"/>
    <text x="6" y="1">SKU LFG2</text>
  </g>
</svg>
