      <circle cx="50" cy="24" r="22" fill="none" stroke="#1d4ed8" stroke-width="2.6"/>
      <text x="50" y="20" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="700">ISO</text>
      <text x="50" y="34" text-anchor="middle" font-size="9" fill="#1d4ed8" font-weight="600">27001</text>
      <text x="50" y="68" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1.4" font-weight="600">CERTIFIED</text>
    </g>

    <!-- SOC 2 -->
    <g transform="translate(180,80)">
      <rect x="0" y="-32" width="100" height="120" rx="6" fill="#fff" stroke="#dde2eb" stroke-width="0.8"/>
      <path d="M 50 8 L 80 22 L 80 46 Q 80 64 50 76 Q 20 64 20 46 L 20 22 Z" fill="none" stroke="#0d9488" stroke-width="2.4" stroke-linejoin="round"/>
      <text x="50" y="44" text-anchor="middle" font-size="9" fill="#0d9488" font-weight="700">SOC 2</text>
      <text x="50" y="58" text-anchor="middle" font-size="7" fill="#0d9488" font-weight="600">TYPE II</text>
      <text x="50" y="68" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1.4" font-weight="600">AUDITED</text>
    </g>

    <!-- GDPR -->
    <g transform="translate(300,80)">
      <rect x="0" y="-32" width="100" height="120" rx="6" fill="#fff" stroke="#dde2eb" stroke-width="0.8"/>
      <circle cx="50" cy="22" r="6" fill="none" stroke="#1d4ed8" stroke-width="2"/>
      <circle cx="50" cy="22" r="14" fill="none" stroke="#1d4ed8" stroke-width="2"/>
      <circle cx="50" cy="22" r="22" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-opacity="0.6"/>
      <text x="50" y="64" text-anchor="middle" font-size="13" fill="#1d4ed8" font-weight="700">GDPR</text>
      <text x="50" y="68" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1.4" font-weight="600">EU READY</text>
    </g>

    <!-- POPIA -->
    <g transform="translate(420,80)">
      <rect x="0" y="-32" width="100" height="120" rx="6" fill="#fff" stroke="#dde2eb" stroke-width="0.8"/>
      <rect x="22" y="6" width="56" height="40" rx="2" fill="#06b6a4" fill-opacity="0.16" stroke="#06b6a4" stroke-width="1.8"/>
      <path d="M 32 24 L 44 36 L 68 12" fill="none" stroke="#06b6a4" stroke-width="3" stroke-linecap="round"/>
      <text x="50" y="64" text-anchor="middle" font-size="12" fill="#06b6a4" font-weight="700">POPIA</text>
      <text x="50" y="68" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1.4" font-weight="600">SA READY</text>
