    <!-- HIPAA-ready -->
    <g transform="translate(540,80)">
      <rect x="0" y="-32" width="100" height="120" rx="6" fill="#fff" stroke="#dde2eb" stroke-width="0.8"/>
      <path d="M 30 16 L 50 8 L 70 16 L 70 38 Q 70 56 50 64 Q 30 56 30 38 Z" fill="none" stroke="#1f2937" stroke-width="2"/>
      <path d="M 42 32 L 48 38 L 60 26" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
      <text x="50" y="68" text-anchor="middle" font-size="9" fill="#1f2937" font-weight="700">HIPAA</text>
      <text x="50" y="68" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1.4" font-weight="600" dy="6">READY</text>
