  <text x="60" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#94a3b8">LIFEGUARD · COMPLIANCE STACK</text>
  <text x="60" y="220" font-family="JetBrains Mono, monospace" font-size="9" fill="#94a3b8">99.95 % operator SLA · AES-256 · POPI / GDPR / HIPAA-aligned · TS-Africa: TSA accredited</text>
</svg>
