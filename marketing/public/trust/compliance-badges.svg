<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-label="LifeGuard compliance and trust badges: ISO 27001, SOC 2 Type II, GDPR, POPIA, HIPAA-ready, TSA accredited, 99.95% operator SLA.">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafb"/>
      <stop offset="100%" stop-color="#e9ecf2"/>
    </linearGradient>
  </defs>
  <rect width="720" height="240" fill="url(#bg2)"/>

  <g font-family="Inter, system-ui, sans-serif" fill="#0a1628" font-weight="600" letter-spacing="2.6">
    <!-- ISO 27001 -->
    <g transform="translate(60,80)">
