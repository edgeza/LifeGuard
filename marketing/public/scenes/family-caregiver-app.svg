<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="A family group chat showing a weekly LifeGuard Care digest — medication adherence chart, upcoming Dr Patel appointment, vitals trend — shared by four siblings.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f6f6f4"/>
      <stop offset="100%" stop-color="#ececea"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ecebe5"/>
    </linearGradient>
    <linearGradient id="cardRed" x1="0%" y1="0%" x2="1" y2="0">
      <stop offset="0" stop-color="#e11d2e"/>
      <stop offset="1" stop-color="#8b0c14"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#e11d2e"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(10,10,10,0.05)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" fill="url(#bg)"/>
  <rect width="720" height="480" fill="url(#dots)"/>

  <!-- Phone on a kitchen counter -->
  <g transform="translate(60, 60)">
    <!-- counter -->
    <rect x="-30" y="320" width="380" height="80" rx="14" fill="#0a0a0a" opacity="0.04"/>
    <rect x="-30" y="316" width="380" height="6" rx="3" fill="#0a0a0a" opacity="0.07"/>
    <!-- phone body -->
    <rect x="0" y="0" width="320" height="350" rx="36" fill="url(#phone)" stroke="#0a0a0a" stroke-opacity="0.12" stroke-width="1.5"/>
    <!-- speaker -->
    <rect x="135" y="18" width="50" height="6" rx="3" fill="#0a0a0a" opacity="0.18"/>
    <!-- screen -->
    <rect x="14" y="34" width="292" height="302" rx="22" fill="#fff"/>
    <!-- status bar -->
    <text x="32" y="56" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a" opacity="0.55" font-weight="600">9:41</text>
    <text x="276" y="56" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a" opacity="0.55" font-weight="600">·  ··  ▮</text>

    <!-- header card -->
    <rect x="22" y="68" width="276" height="62" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="0.6"/>
    <text x="32" y="86" font-family="Inter, sans-serif" font-size="8.5" letter-spacing="1.5" fill="#e11d2e" font-weight="700">WEEKLY DIGEST · MON 21 JUL</text>
    <text x="32" y="104" font-family="Inter, sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">Marlene · Week 30</text>
    <text x="32" y="120" font-family="Inter, sans-serif" font-size="9.5" fill="#0a0a0a" opacity="0.55">89% adherence · 1 upcoming appt · stable</text>

    <!-- adherence bars (mini chart) -->
    <text x="32" y="148" font-family="Inter, sans-serif" font-size="9" letter-spacing="1.2" fill="#0a0a0a" opacity="0.55" font-weight="600">7-DAY ADHERENCE</text>
    <g transform="translate(32, 156)">
      <rect x="0"   y="22" width="28" height="32" rx="3" fill="url(#bar)" opacity="0.92"/>
      <rect x="34"  y="26" width="28" height="28" rx="3" fill="url(#bar)" opacity="0.92"/>
      <rect x="68"  y="14" width="28" height="40" rx="3" fill="url(#bar)" opacity="0.92"/>
      <rect x="102" y="20" width="28" height="34" rx="3" fill="url(#bar)" opacity="0.92"/>
      <rect x="136" y="28" width="28" height="26" rx="3" fill="url(#bar)" opacity="0.92"/>
      <rect x="170" y="22" width="28" height="32" rx="3" fill="url(#bar)" opacity="0.92"/>
      <rect x="204" y="18" width="28" height="36" rx="3" fill="url(#bar)" opacity="0.92"/>
      <text x="14"  y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">M</text>
      <text x="48"  y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">T</text>
      <text x="82"  y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">W</text>
      <text x="116" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">T</text>
      <text x="150" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">F</text>
      <text x="184" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">S</text>
      <text x="218" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#0a0a0a" opacity="0.5">S</text>
    </g>

    <!-- vitals trend (mini sparkline) -->
    <text x="32" y="252" font-family="Inter, sans-serif" font-size="9" letter-spacing="1.2" fill="#0a0a0a" opacity="0.55" font-weight="600">RESTING HR · 7 DAYS</text>
    <g transform="translate(32, 258)">
      <path d="M0 28 L36 24 L72 30 L108 18 L144 22 L180 14 L216 18 L252 10" fill="none" stroke="url(#bar)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="252" cy="10" r="3" fill="#e11d2e"/>
      <text x="262" y="14" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a" font-weight="600">72 bpm</text>
    </g>

    <!-- next appointment card -->
    <rect x="22" y="296" width="276" height="38" rx="8" fill="#fff7f8" stroke="#fecdd3" stroke-width="0.6"/>
    <circle cx="36" cy="315" r="4" fill="#e11d2e"/>
    <text x="48" y="312" font-family="Inter, sans-serif" font-size="8.5" letter-spacing="1.2" fill="#e11d2e" font-weight="700">THU 24 JUL · 10:15</text>
    <text x="48" y="324" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" font-weight="600">Dr Patel — follow-up</text>
    <text x="288" y="320" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a" opacity="0.55">Lerato driving</text>

  </g>

  <!-- Group chat thread on the right -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="240" height="280" rx="14" fill="#fff" stroke="#e5e5e5" stroke-width="0.8"/>
    <rect x="0" y="0" width="240" height="36" rx="14" fill="#0a0a0a"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fff">Family · Marlene's Care</text>
    <text x="226" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#fff" opacity="0.6">4 online</text>

    <!-- bot card pinned -->
    <g transform="translate(12, 46)">
      <rect x="0" y="0" width="216" height="68" rx="10" fill="url(#cardRed)"/>
      <text x="10" y="16" font-family="Inter, sans-serif" font-size="8" letter-spacing="1.2" fill="#fff" opacity="0.85" font-weight="700">LIFEGUARD · WEEKLY DIGEST</text>
      <text x="10" y="32" font-family="Inter, sans-serif" font-size="10" fill="#fff" font-weight="600">Marlene took 12 of 14 doses this week.</text>
      <text x="10" y="46" font-family="Inter, sans-serif" font-size="9.5" fill="#fff" opacity="0.92">Dr Patel on Thu · HR back to baseline.</text>
      <text x="10" y="60" font-family="Inter, sans-serif" font-size="9" fill="#fff" opacity="0.78">Tap to view full digest.</text>
    </g>

    <!-- sibling reply 1 -->
    <g transform="translate(12, 124)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="8" letter-spacing="1" fill="#0a0a0a" opacity="0.5" font-weight="600">LERATO · 09:14</text>
      <rect x="0" y="6" width="180" height="34" rx="10" fill="#fafafa"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">I can drive Thursday. Will call</text>
      <text x="10" y="32" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">her tonight to confirm.</text>
    </g>

    <!-- sibling reply 2 -->
    <g transform="translate(40, 174)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="8" letter-spacing="1" fill="#0a0a0a" opacity="0.5" font-weight="600">SIPHO · 09:18</text>
      <rect x="0" y="6" width="190" height="34" rx="10" fill="#fafafa"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">If she misses her dose tomorrow</text>
      <text x="10" y="32" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">I will call her. 👍</text>
    </g>

    <!-- sibling reply 3 -->
    <g transform="translate(12, 224)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="8" letter-spacing="1" fill="#0a0a0a" opacity="0.5" font-weight="600">NOMSA · 09:21</text>
      <rect x="0" y="6" width="150" height="34" rx="10" fill="#fafafa"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">Should we book her</text>
      <text x="10" y="32" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">flu shot too?</text>
    </g>
  </g>

  <!-- caption overlay -->
  <text x="60" y="450" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" opacity="0.7" font-weight="500">Care bot weekly digest, posted to the family group chat.</text>
</svg>