<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="A daughter opens the Caregiver App on her phone to check her mother's status while she makes coffee.">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3eadd"/>
      <stop offset="100%" stop-color="#dac6ad"/>
    </linearGradient>
    <linearGradient id="phoneBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ecebe5"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f0efe9"/>
    </linearGradient>
    <linearGradient id="mug" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#d6cdb9"/>
    </linearGradient>
    <radialGradient id="warm" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#e9e2d0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="480" fill="url(#warm)"/>

  <!-- kitchen counter with subtle wood-grain -->
  <rect y="280" width="720" height="200" fill="url(#wood)"/>
  <g opacity="0.15" stroke="#9c7841" stroke-width="0.6">
    <line x1="0" y1="320" x2="720" y2="320"/>
    <line x1="0" y1="360" x2="720" y2="360"/>
    <line x1="0" y1="400" x2="720" y2="400"/>
    <line x1="0" y1="440" x2="720" y2="440"/>
  </g>

  <!-- soft window light from top-left -->
  <radialGradient id="sun" cx="15%" cy="0%" r="65%">
    <stop offset="0%" stop-color="#fff" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </radialGradient>
  <rect width="720" height="280" fill="url(#sun)"/>

  <!-- steaming coffee mug -->
  <g transform="translate(80,260)">
    <ellipse cx="0" cy="98" rx="40" ry="6" fill="#7c5d3a" opacity="0.15"/>
    <path d="M -32 0 L 32 0 L 32 70 Q 32 90 12 90 L -12 90 Q -32 90 -32 70 Z" fill="url(#mug)"/>
    <ellipse cx="0" cy="0" rx="32" ry="6" fill="#fff8ee"/>
    <ellipse cx="0" cy="0" rx="26" ry="3.6" fill="#3a2918"/>
    <!-- handle -->
    <path d="M 32 14 Q 56 14 56 36 Q 56 56 32 56" fill="none" stroke="#d6cdb9" stroke-width="6" stroke-linecap="round"/>
    <!-- steam -->
    <g stroke="#94a3b8" stroke-opacity="0.6" fill="none" stroke-width="1.4" stroke-linecap="round">
      <path d="M -10 -8 Q -14 -22 -8 -34 Q -2 -46 -10 -64"/>
      <path d="M 4 -10 Q 0 -28 6 -42 Q 12 -54 4 -68"/>
      <path d="M 18 -6 Q 14 -20 22 -34 Q 26 -50 18 -64"/>
    </g>
  </g>

  <!-- a small notebook -->
  <g transform="translate(540,360)">
    <rect x="-50" y="-30" width="100" height="60" rx="4" fill="#fff" stroke="#cbd5e1" stroke-width="0.6" filter="url(#softShadow)"/>
    <line x1="-40" y1="-15" x2="40" y2="-15" stroke="#cbd5e1" stroke-width="0.4"/>
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#cbd5e1" stroke-width="0.4"/>
    <line x1="-40" y1="5" x2="20" y2="5" stroke="#cbd5e1" stroke-width="0.4"/>
    <!-- a pen -->
    <line x1="-30" y1="20" x2="40" y2="-30" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-30" y1="20" x2="-26" y2="22" stroke="#0a27a8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ============ -->
  <!-- the phone (held in a hand from below, suggesting "the daughter") -->
  <!-- ============ -->
  <g transform="translate(420,200) rotate(-6)" filter="url(#softShadow)">
    <!-- phone shadow on the counter -->
    <ellipse cx="20" cy="170" rx="130" ry="10" fill="#0b1320" opacity="0.12"/>
    <!-- the hand holding it -->
    <path d="M -130 120 Q -130 90 -90 80 L 80 80 Q 130 80 130 110 L 130 160 L -130 160 Z" fill="url(#mug)" opacity="0.95"/>
    <!-- thumb hint -->
    <path d="M -90 80 Q -70 70 -50 80 Q -30 90 -10 80" fill="none" stroke="#c4a884" stroke-width="1.4" opacity="0.4"/>
    <!-- the phone -->
    <rect x="-110" y="-110" width="220" height="220" rx="22" fill="url(#phoneBody)"/>
    <rect x="-110" y="-110" width="220" height="220" rx="22" fill="none" stroke="#1f2937" stroke-opacity="0.18" stroke-width="1.4"/>
    <rect x="-104" y="-104" width="208" height="208" rx="18" fill="url(#phoneScreen)"/>
    <!-- the camera pill -->
    <rect x="-30" y="-100" width="60" height="14" rx="7" fill="#1f2937"/>

    <!-- =========================== -->
    <!-- the Caregiver App interface -->
    <!-- =========================== -->
    <g>
      <!-- status bar -->
      <text x="-94" y="-78" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1f2937">9:41</text>
      <text x="94" y="-78" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#1f2937">●●●● 5G</text>

      <!-- the date stamp -->
      <text x="0" y="-50" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2.4" fill="#94a3b8" font-weight="600">SUNDAY · 17 JULY</text>
      <text x="0" y="-26" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="300" letter-spacing="-0.4" fill="#0a1628">Good morning, Marisa.</text>

      <!-- the three subscriber cards -->
      <g transform="translate(-92,4)">
        <!-- Mom (green) -->
        <g>
          <rect x="0" y="0" width="58" height="78" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
          <rect x="6" y="6" width="46" height="46" rx="9" fill="#06b6a4"/>
          <text x="29" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="300" fill="#fff">M</text>
          <text x="29" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="600" fill="#0a1628">Margaret</text>
          <text x="29" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#94a3b8">HR 68 · OK</text>
        </g>
        <!-- Dad (amber) -->
        <g transform="translate(64,0)">
          <rect x="0" y="0" width="58" height="78" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.4"/>
          <rect x="6" y="6" width="46" height="46" rx="9" fill="#f59e0b"/>
          <text x="29" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="300" fill="#fff">H</text>
          <text x="29" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="600" fill="#0a1628">Hendrik</text>
          <text x="29" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#94a3b8">12% batt</text>
        </g>
        <!-- Sam (green) -->
        <g transform="translate(128,0)">
          <rect x="0" y="0" width="58" height="78" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
          <rect x="6" y="6" width="46" height="46" rx="9" fill="#1d4ed8"/>
          <text x="29" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="300" fill="#fff">S</text>
          <text x="29" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="600" fill="#0a1628">Sam</text>
          <text x="29" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#94a3b8">HR 64 · OK</text>
        </g>
      </g>
    </g>
  </g>

  <!-- subtle caption -->
  <text x="60" y="430" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#475569" letter-spacing="-0.1">"Morning check from the kitchen counter. Sunday ritual, not always-on emergency."</text>
  <text x="60" y="450" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#94a3b8">FAMILY APP · UNAUTHENTICATED STILL</text>
</svg>
