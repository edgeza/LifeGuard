<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="A close-up of the LifeBand G2 on a wrist, with the wearer's hand holding a walking stick.">
  <defs>
    <radialGradient id="warm" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f4ecdc"/>
      <stop offset="100%" stop-color="#c8b390"/>
    </radialGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d8b5"/>
      <stop offset="100%" stop-color="#c69b6b"/>
    </linearGradient>
    <linearGradient id="caseMetal2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4252"/>
      <stop offset="50%" stop-color="#252b3a"/>
      <stop offset="100%" stop-color="#14181f"/>
    </linearGradient>
    <linearGradient id="screen2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1620"/>
      <stop offset="100%" stop-color="#050a13"/>
    </linearGradient>
    <linearGradient id="strap2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0b1320"/>
    </linearGradient>
    <linearGradient id="stick" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5d3a"/>
      <stop offset="100%" stop-color="#3b2918"/>
    </linearGradient>
    <filter id="softDrop"><feGaussianBlur in="SourceAlpha" stdDeviation="5"/><feOffset dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="720" height="480" fill="url(#warm)"/>
  <!-- garden/path blur background hint -->
  <g opacity="0.18">
    <circle cx="80" cy="380" r="120" fill="#5b8a4f"/>
    <circle cx="640" cy="120" r="100" fill="#94a3b8"/>
    <circle cx="540" cy="340" r="150" fill="#4f7e44"/>
  </g>

  <!-- the arm & hand coming from the right -->
  <g>
    <!-- forearm -->
    <path d="M 280 280 L 720 220 L 720 320 L 280 360 Z" fill="url(#skinTone)"/>
    <!-- sleeve hint -->
    <path d="M 580 240 L 720 220 L 720 250 L 600 270 Z" fill="#5a4334" opacity="0.7"/>
    <!-- hand -->
    <ellipse cx="270" cy="320" rx="80" ry="56" fill="url(#skinTone)"/>
    <!-- four fingers -->
    <ellipse cx="200" cy="290" rx="22" ry="14" fill="url(#skinTone)"/>
    <ellipse cx="190" cy="320" rx="22" ry="14" fill="url(#skinTone)"/>
    <ellipse cx="190" cy="350" rx="22" ry="14" fill="url(#skinTone)"/>
    <ellipse cx="200" cy="380" rx="22" ry="14" fill="url(#skinTone)"/>
    <!-- thumb -->
    <ellipse cx="240" cy="370" rx="20" ry="28" fill="url(#skinTone)" transform="rotate(-22 240 370)"/>

    <!-- crease / knuckle lines -->
    <g stroke="#9d774a" stroke-opacity="0.35" fill="none" stroke-width="0.6">
      <path d="M 210 314 Q 250 318 290 320"/>
      <path d="M 200 346 Q 250 348 290 348"/>
      <path d="M 240 372 Q 250 376 260 380"/>
    </g>
  </g>

  <!-- the LifeBand G2 on the wrist -->
  <g transform="translate(420,270) rotate(-12)" filter="url(#softDrop)">
    <!-- strap top -->
    <path d="M -100 -10 Q -130 8 -120 30 L -50 30 L -50 -10 Z" fill="url(#strap2)"/>
    <!-- strap bottom -->
    <path d="M -100 10 Q -130 -8 -120 -30 L -50 -30 L -50 10 Z" fill="url(#strap2)"/>

    <!-- the case -->
    <rect x="-50" y="-46" width="100" height="92" rx="22" fill="url(#caseMetal2)"/>
    <rect x="-48" y="-44" width="96" height="88" rx="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.2"/>
    <!-- screen -->
    <rect x="-42" y="-34" width="84" height="68" rx="16" fill="url(#screen2)"/>
    <!-- screen sheen -->
    <path d="M -42 -34 Q -8 -28 14 -34 L 14 0 Q -8 6 -42 0 Z" fill="rgba(255,255,255,0.05)"/>

    <!-- screen UI -->
    <g font-family="Inter, system-ui, sans-serif">
      <text x="-32" y="-20" font-size="6" font-weight="600" letter-spacing="2.4" fill="#94a3b8">LIFEBAND · G2</text>
      <text x="34" y="-20" text-anchor="end" font-size="6" font-weight="600" letter-spacing="2.4" fill="#06b6a4">●&nbsp;LINK</text>
      <text x="-32" y="6" font-size="22" font-weight="300" letter-spacing="-0.4" fill="#e6e9ef">72</text>
      <text x="-12" y="6" font-size="9" fill="#94a3b8">bpm</text>
      <text x="-32" y="22" font-size="6" font-weight="600" fill="#94a3b8">HRV 42 · SpO₂ 97%</text>
    </g>

    <!-- crown button on the right -->
    <rect x="48" y="-8" width="6" height="16" rx="2" fill="#475569"/>
  </g>

  <!-- the wearable's subtle pulse halo (visible against the skin) -->
  <g transform="translate(420,270) rotate(-12)">
    <circle cx="0" cy="0" r="68" fill="none" stroke="#06b6a4" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="0" cy="0" r="86" fill="none" stroke="#06b6a4" stroke-opacity="0.10" stroke-width="1.4"/>
  </g>

  <!-- a wooden walking stick (held in the other hand, off-canvas) -->
  <g transform="translate(60,260)" filter="url(#softDrop)">
    <line x1="0" y1="-200" x2="80" y2="220" stroke="url(#stick)" stroke-width="6" stroke-linecap="round"/>
    <!-- handle -->
    <path d="M -8 -200 Q -22 -198 -26 -186 Q -26 -172 -16 -170 Q -8 -168 -2 -178 Z" fill="url(#stick)"/>
    <!-- rubber foot -->
    <ellipse cx="86" cy="220" rx="14" ry="6" fill="#1f2937"/>
  </g>

  <!-- caption -->
  <text x="60" y="450" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#475569" letter-spacing="-0.1">"I wear it once a week. It texts my daughter when I take my walk."</text>
  <text x="60" y="430" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#94a3b8">ELDERLY · UNATTACHED · EVERY DAY</text>
</svg>
