<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="An armed-response operator at a control-room desk handling an incident.">
  <defs>
    <linearGradient id="controlWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#0f1114"/>
    </linearGradient>
    <linearGradient id="desk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1c20"/>
      <stop offset="100%" stop-color="#0d0e11"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(6,182,164,0.18)"/>
      <stop offset="100%" stop-color="rgba(6,182,164,0)"/>
    </radialGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22272f"/>
      <stop offset="100%" stop-color="#0e1014"/>
    </linearGradient>
    <linearGradient id="skinLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a4334"/>
      <stop offset="100%" stop-color="#3b2a1f"/>
    </linearGradient>
    <filter id="dropS"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="720" height="480" fill="url(#controlWall)"/>

  <!-- wall logos (faint) -->
  <g transform="translate(60,60)" opacity="0.18" fill="#94a3b8">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="2.4">CRESCENT ARMED RESPONSE</text>
    <circle cx="220" cy="-4" r="6" fill="#06b6a4"/>
  </g>
  <text x="60" y="80" font-family="Inter, sans-serif" font-size="9" letter-spacing="2.4" opacity="0.4" fill="#94a3b8" font-weight="600">LIFEGUARD · OPERATOR SHIFT · ACTIVE</text>

  <!-- big linear array of monitor panels across the back wall -->
  <g transform="translate(60,110)" filter="url(#dropS)">
    <!-- panel 1 — the map -->
    <g>
      <rect x="0" y="0" width="380" height="200" rx="6" fill="#0a0c10" stroke="rgba(255,255,255,0.07)"/>
      <rect x="6" y="6" width="368" height="188" rx="3" fill="#0f1114"/>
      <!-- header -->
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2.4" fill="#94a3b8">MAP · CITY BOWL</text>
      <text x="370" y="22" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#94a3b8">04:12 UTC</text>
      <!-- grid -->
      <g stroke="rgba(255,255,255,0.04)" stroke-width="0.4">
        <line x1="6" y1="50" x2="374" y2="50"/>
        <line x1="6" y1="100" x2="374" y2="100"/>
        <line x1="6" y1="150" x2="374" y2="150"/>
        <line x1="80" y1="30" x2="80" y2="190"/>
        <line x1="160" y1="30" x2="160" y2="190"/>
        <line x1="240" y1="30" x2="240" y2="190"/>
        <line x1="320" y1="30" x2="320" y2="190"/>
      </g>
      <!-- coastline -->
      <path d="M 6 130 Q 80 90 160 120 Q 240 150 320 110 L 374 130" stroke="rgba(82,148,255,0.45)" stroke-width="0.8" fill="none"/>
      <text x="100" y="160" font-family="Inter, sans-serif" font-size="7" fill="rgba(82,148,255,0.6)">Atlantic</text>
      <!-- pins -->
      <circle cx="120" cy="80" r="3" fill="#06b6a4"/>
      <circle cx="180" cy="60" r="3" fill="#1d4ed8"/>
      <circle cx="220" cy="120" r="3" fill="#1d4ed8"/>
      <circle cx="60" cy="140" r="3" fill="#1d4ed8"/>
      <circle cx="280" cy="90" r="3" fill="#1d4ed8"/>
      <circle cx="130" cy="92" r="6" fill="#dc2626"/>
      <circle cx="130" cy="92" r="11" fill="none" stroke="#dc2626" stroke-opacity="0.6"/>
      <text x="130" y="96" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#fff">!</text>
      <!-- responder route -->
      <line x1="180" y1="60" x2="130" y2="92" stroke="#06b6a4" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="3 3"/>
    </g>

    <!-- panel 2 — alert queue -->
    <g transform="translate(396,0)">
      <rect x="0" y="0" width="240" height="200" rx="6" fill="#0a0c10" stroke="rgba(255,255,255,0.07)"/>
      <rect x="6" y="6" width="228" height="188" rx="3" fill="#0f1114"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2.4" fill="#94a3b8">QUEUE · 4 OPEN</text>
      <!-- alert 1 -->
      <g>
        <rect x="14" y="36" width="212" height="36" rx="4" fill="rgba(220,38,38,0.10)" stroke="rgba(220,38,38,0.45)"/>
        <circle cx="26" cy="54" r="6" fill="#dc2626"/>
        <text x="26" y="58" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#fff">!</text>
        <text x="40" y="50" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fff">HIGH · 0.91</text>
        <text x="40" y="62" font-family="Inter, sans-serif" font-size="8" fill="#cbd5e1">Lerato D. · 71F · Cape Town</text>
        <text x="216" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#34d399">00:42</text>
      </g>
      <!-- alert 2 -->
      <g transform="translate(0,44)">
        <rect x="14" y="36" width="212" height="32" rx="4" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.4)"/>
        <circle cx="26" cy="52" r="5" fill="#f59e0b"/>
        <text x="40" y="50" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fff">MED · 0.62 · Camps Bay</text>
        <text x="216" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#94a3b8">02:18</text>
      </g>
      <!-- alert 3 -->
      <g transform="translate(0,84)">
        <rect x="14" y="36" width="212" height="32" rx="4" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.4)"/>
        <circle cx="26" cy="52" r="5" fill="#60a5fa"/>
        <text x="40" y="50" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fff">LOW · 0.34 · low batt</text>
        <text x="216" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#94a3b8">04:02</text>
      </g>
      <!-- footer -->
      <text x="14" y="190" font-family="Inter, sans-serif" font-size="8" fill="#94a3b8">RESPONDERS</text>
      <text x="226" y="190" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#06b6a4">8 / 8</text>
    </g>
  </g>

  <!-- the operator — back of head and shoulders, leaning toward the panels -->
  <g transform="translate(560,290)">
    <!-- shoulders -->
    <path d="M -100 100 Q -100 30 -50 20 L 50 20 Q 100 30 100 100 Z" fill="url(#jacket)"/>
    <!-- head (just the back) -->
    <ellipse cx="0" cy="0" rx="34" ry="38" fill="url(#skinLight)"/>
    <!-- short hair -->
    <path d="M -34 -10 Q -36 -30 -20 -36 Q 0 -42 20 -36 Q 36 -30 34 -10 L 30 -22 Q 0 -34 -30 -22 Z" fill="#1a0e08"/>
    <!-- earpiece on the right ear (radio headset) -->
    <ellipse cx="32" cy="-4" rx="6" ry="10" fill="#1f2937"/>
    <!-- mic boom -->
    <path d="M 36 -2 Q 38 14 28 22" fill="none" stroke="#1f2937" stroke-width="2"/>
    <circle cx="28" cy="22" r="3" fill="#1f2937"/>
    <!-- a subtle headset light -->
    <circle cx="40" cy="-12" r="1.4" fill="#34d399"/>
    <!-- name patch -->
    <rect x="-32" y="40" width="64" height="20" rx="3" fill="#0a0c10" stroke="rgba(255,255,255,0.08)"/>
    <text x="0" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2.4" fill="#94a3b8">THEMBA · α-1</text>
  </g>

  <!-- desk surface in front -->
  <rect x="0" y="380" width="720" height="100" fill="url(#desk)"/>
  <!-- keyboard + mouse hints -->
  <g transform="translate(180,440)">
    <rect x="-110" y="-12" width="220" height="22" rx="3" fill="#1a1c20" stroke="rgba(255,255,255,0.06)"/>
    <g opacity="0.4" stroke="#475569" stroke-width="0.5">
      <line x1="-100" y1="-6" x2="100" y2="-6"/>
      <line x1="-100" y1="0" x2="100" y2="0"/>
      <line x1="-100" y1="6" x2="100" y2="6"/>
    </g>
    <ellipse cx="140" cy="0" rx="14" ry="8" fill="#1a1c20" stroke="rgba(255,255,255,0.06)"/>
  </g>

  <!-- a coffee mug and clipboard on the desk -->
  <g transform="translate(640,420)">
    <path d="M -16 0 L 16 0 L 16 30 Q 16 36 10 36 L -10 36 Q -16 36 -16 30 Z" fill="#fff" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="14" ry="3" fill="#cbd5e1"/>
    <path d="M 16 6 Q 28 6 28 16 Q 28 26 16 26" fill="none" stroke="#fff" stroke-opacity="0.7" stroke-width="2.4" stroke-linecap="round"/>
  </g>
  <g transform="translate(60,420)">
    <rect x="-30" y="-40" width="60" height="48" rx="2" fill="#fff" opacity="0.9"/>
    <line x1="-22" y1="-26" x2="22" y2="-26" stroke="#cbd5e1"/>
    <line x1="-22" y1="-16" x2="22" y2="-16" stroke="#cbd5e1"/>
    <line x1="-22" y1="-6" x2="10" y2="-6" stroke="#cbd5e1"/>
  </g>

  <!-- subtle screen glow cast on operator face -->
  <rect width="720" height="480" fill="url(#screenGlow)"/>

  <!-- caption -->
  <text x="60" y="450" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="-0.1">Linear-class console in your browser · no install · no server.</text>
  <text x="60" y="470" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#06b6a4">CONSOLE · CROWN OPERATOR · CRESCENT</text>
</svg>
