<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#e11d2e" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#e11d2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e11d2e"/>
      <stop offset="1" stop-color="#8b0c14"/>
    </linearGradient>
    <linearGradient id="textShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e11d2e"/>
      <stop offset="0.5" stop-color="#8b0c14"/>
      <stop offset="1" stop-color="#e11d2e"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(10,10,10,0.07)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Brand mark (top-left) -->
  <g transform="translate(72, 72)">
    <rect width="56" height="56" rx="12" fill="url(#brand)"/>
    <path d="M16 42V14h8v22h14v6H16z" fill="#fff"/>
    <circle cx="42" cy="17" r="3" fill="#fff"/>
  </g>
  <text x="148" y="108" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#0a0a0a" letter-spacing="-0.3">LifeGuard</text>

  <!-- Headline (left) -->
  <g transform="translate(72, 200)">
    <text font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#e11d2e" letter-spacing="3">v2026.07 · NOW SHIPPING</text>
    <text y="58" font-family="Inter, sans-serif" font-size="78" font-weight="600" fill="#0a0a0a" letter-spacing="-2.5">
      <tspan x="0" dy="0">When the band</tspan>
      <tspan x="0" dy="86">presses,</tspan>
      <tspan x="0" dy="86" fill="url(#textShimmer)">the line opens.</tspan>
    </text>
    <text y="450" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#4b5563">
      <tspan x="0" dy="0">Medical-grade wearables · Linear-class operator console · open REST API.</tspan>
    </text>
    <text y="498" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#6b7280">
      <tspan x="0" dy="0">4 first-party carrier markets · 6 SDKs · 100k events/month free</tspan>
    </text>
  </g>

  <!-- Decorative pulse wave (right) -->
  <g transform="translate(820, 320)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#e11d2e" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#e11d2e" stroke-opacity="0.22" stroke-width="2"/>
    <circle cx="0" cy="0" r="56" fill="url(#brand)"/>
    <path d="M-30 0 H-12 L-6 -22 L4 28 L12 -16 L18 0 H30" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom-left brand line -->
  <g transform="translate(72, 568)">
    <text font-family="JetBrains Mono, monospace" font-size="14" fill="#6b7280" letter-spacing="0.5">lifeguard.example.com</text>
  </g>
</svg>
